spring.application.name=arriendo
server.port=4001

spring.datasource.url=jdbc:mysql://localhost:3307/arriendo_db
spring.datasource.username=arriendo_user
spring.datasource.password=arriendo_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.application.name=arriendo-ms

api.cliente.baseUrl=http://localhost:4002
api.moto.baseUrl=http://localhost:4003

jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:3600000}